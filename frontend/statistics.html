<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>statistics</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f1320;
color:white;
}

.container{
max-width:380px;
margin:auto;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header button{
background:#1b1f38;
border:none;
color:white;
width:40px;
height:40px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.center{
text-align:center;
margin-bottom:20px;
}

.balance{
font-size:28px;
font-weight:bold;
margin-top:8px;
}

.chart{
margin-top:20px;
}

canvas{
width:100%;
height:200px;
}

.months{
display:flex;
justify-content:space-between;
margin-top:10px;
color:#aaa;
}

.months span{
padding:5px 10px;
border-radius:8px;
}

.active{
background:#1e6bff;
color:white;
}

.transactions{
margin-top:25px;
}

.transaction{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.icon{
width:40px;
height:40px;
border-radius:50%;
background:#1b1f38;
display:flex;
align-items:center;
justify-content:center;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#171a33;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav-item{
text-align:center;
font-size:12px;
color:#aaa;
}

.nav-active{
color:#2f7bff;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<button>←</button>
<h3>statistics</h3>
<button>🔔</button>
</div>

<div class="center">
<div>current balance</div>
<div class="balance">$8,545.00</div>
</div>

<div class="chart">
<canvas id="chart"></canvas>

<div class="months">
<span>oct</span>
<span>nov</span>
<span>dec</span>
<span class="active">jan</span>
<span>feb</span>
<span>mar</span>
</div>
</div>


<div class="transactions">

<div style="display:flex;justify-content:space-between;">
<h3>transaction</h3>
<span style="color:#2f7bff;">sell all</span>
</div>

<div class="transaction">
<div class="left">
<div class="icon">🍎</div>
<div>
<b>apple store</b><br>
<small>entertainment</small>
</div>
</div>
<div>- $5,99</div>
</div>

<div class="transaction">
<div class="left">
<div class="icon">🎵</div>
<div>
<b>spotify</b><br>
<small>music</small>
</div>
</div>
<div>- $12,99</div>
</div>

<div class="transaction">
<div class="left">
<div class="icon">⬇</div>
<div>
<b>money transfer</b><br>
<small>transaction</small>
</div>
</div>
<div style="color:#2f7bff">$300</div>
</div>

</div>

</div>


<div class="bottom-nav">
<div class="nav-item">🏠<br>home</div>
<div class="nav-item nav-active">💳<br>my cards</div>
<div class="nav-item">📊<br>statistics</div>
<div class="nav-item">⚙<br>settings</div>
</div>


<script>

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = 350;
canvas.height = 200;

const data = [40,80,50,120,70,140];

ctx.strokeStyle = "#2f7bff";
ctx.lineWidth = 4;

ctx.beginPath();

data.forEach((value,index)=>{
let x = index * 60;
let y = 180 - value;

if(index === 0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}
});

ctx.stroke();

</script>

</body>
</html>
