<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mobile banking ui</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0f1320;
    color:white;
}

.container{
    max-width:380px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.profile{
    display:flex;
    align-items:center;
    gap:10px;
}

.profile img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.card{
    background:linear-gradient(135deg,#1b2040,#2b2f63);
    border-radius:18px;
    padding:20px;
    margin-top:20px;
}

.card-number{
    font-size:22px;
    letter-spacing:2px;
    margin-bottom:15px;
}

.card-bottom{
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

.actions{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.action{
    text-align:center;
}

.action button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
    background:#1e233f;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.transactions{
    margin-top:25px;
}

.transaction{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
}

.trans-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.icon{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#1e233f;
    display:flex;
    align-items:center;
    justify-content:center;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#171a33;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
}

.nav-item{
    text-align:center;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="profile">
<img src="https://i.pravatar.cc/100">
<div>
<small>welcome back</small><br>
<b>tanya myroniuk</b>
</div>
</div>
<div>🔍</div>
</div>

<div class="card">
<div class="card-number">4562 1122 4595 7852</div>
<div class="card-bottom">
<div>
<small>expiry</small><br>
24/2000
</div>
<div>
<b>mastercard</b>
</div>
</div>
</div>

<div class="actions">
<div class="action">
<button onclick="action('sent')">↑</button>
<div>sent</div>
</div>

<div class="action">
<button onclick="action('receive')">↓</button>
<div>receive</div>
</div>

<div class="action">
<button onclick="action('loan')">$</button>
<div>loan</div>
</div>

<div class="action">
<button onclick="action('topup')">⤴</button>
<div>topup</div>
</div>
</div>

<div class="transactions">
<h3>transaction</h3>

<div class="transaction">
<div class="trans-left">
<div class="icon">🍎</div>
<div>
<b>apple store</b><br>
<small>entertainment</small>
</div>
</div>
<div>rp 8.500.000</div>
</div>

<div class="transaction">
<div class="trans-left">
<div class="icon">🎵</div>
<div>
<b>spotify</b><br>
<small>music</small>
</div>
</div>
<div>rp 1.200.000</div>
</div>

<div class="transaction">
<div class="trans-left">
<div class="icon">⬇</div>
<div>
<b>money transfer</b><br>
<small>transaction</small>
</div>
</div>
<div style="color:#3da6ff">rp 5000</div>
</div>

<div class="transaction">
<div class="trans-left">
<div class="icon">🛒</div>
<div>
<b>grocery</b><br>
<small>shopping</small>
</div>
</div>
<div style="color:#ff6b6b">-rp 1000</div>
</div>

</div>

</div>

<div class="bottom-nav">
<div class="nav-item">🏠<br>home</div>
<div class="nav-item">💳<br>my cards</div>
<div class="nav-item">📊<br>statistics</div>
<div class="nav-item">⚙<br>settings</div>
</div>

<script>
function action(type){
    alert("you pressed " + type);
}
</script>

</body>
</html>
